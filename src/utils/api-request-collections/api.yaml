              mimeType: application/json
              text: >-
                {
                	"phrase": "Nascemos para democratizar os serviços bancários e de pagamentos! Pioneirismo, tecnologia, inovação e resultados sustentáveis são constantes da nossa trajetória. Lançamos a primeira maquininha de cartão sem aluguel do Brasil e ao longo dos anos seguimos evoluindo para ampliar nosso ecossistema de soluções financeiras. Somos o 2º maior banco digital do país e a fintech mais rentável do segmento, resultado do trabalho de um time formado por pessoas talentosas e criativas, que atuam com dedicação, paixão e vontade de fazer acontecer. Se você ama tecnologia, curte um bom desafio e acredita no poder da colaboração para fazer grandes entregas, o Pags é pra você! Então, confira essa oportunidade e vem pintar o Brasil de amarelo com a gente💛! No PagBank todas as pessoas são bem-vindas 😊, sem distinção de gênero, orientação sexual, etnia, cultura, religião, deficiência etc. O importante é você gostar de desafios, trabalhar bem em equipe, vivenciar nossa cultura e nossa missão de transformar e democratizar os serviços bancários e de pagamentos no Brasil. #VemProPags RESPONSABILIDADES E ATRIBUIÇÕES\n   * Construir software de qualidade, que seja escalável para um alto volume de dados e aplicações de alto risco.\n   * Participar da concepção de todo ciclo de vida de uma nova funcionalidade/produto e ser responsável pela entrega e acompanhamento.\n   * Definir a arquitetura de aplicações.\n   * Criar soluções que tornem a vida de nossos clientes mais simples e produtiva.\n   * Planejar, estimar e analisar impactos e riscos em mudanças de aplicações.\n   * Criar e acompanhar métricas de qualidade e monitoramento das aplicações desenvolvidas.\n   * Garantir a confiabilidade da plataforma junto ao time Segurança.\n   * Participar nas melhorias do processo de desenvolvimento técnico do time. \n\n\nREQUISITOS E QUALIFICAÇÕES\n   * Superior em Ciências da Computação, Engenharia, Sistemas da Informação ou áreas correlatas.\n   * Experiência com linguagem de programação Java.\n   * Conhecimento em estrutura de dados, algoritmos e análise de complexidade.\n   * Conhecimento em programação orientada a objetos e Design Patterns.\n   * Experiência com modelagem e integração de bancos de dados relacionais.\n   * Domínio de modelagem, documentação e implementação de APIs.\n   * Experiência com testes unitários.\n   * Experiência com ferramentas e práticas de observabilidade e troubleshooting de aplicações.\n   * Experiência em CI/CD.\n   * Experiência com melhores práticas de qualidade de software, como testes automatizados, segurança, monitoração e documentação.\n   * Experiência com uso de Cloud e IAAS.\n   * Experiência com desenvolvimento de arquitetura distribuídas, resilientes, escaláveis e de alta performance.\n   * Experiência com uso de filas MQ/mensagerias.\n   * Experiência com sistemas monolitos – Java.\n   * Experiência com aplicações containerizadas utilizando Docker.\n   * Experiência com o uso do orquestrador Kubernetes.\n   * Conhecimento em pesquisas e análise de problemas via Splunk.\n   * Experiência com sistemas distribuídos e padrões transacionais.\n   * Conhecimento em processamento de eventos via Kafka.\n\n\nSOBRE NÓSNascemos em 2006 para revolucionar o mercado de meios de pagamento e democratizar o acesso aos serviços financeiros.\nFoi com a gente que os consumidores passaram a comprar e vender – dentro e fora da internet – de forma rápida, simples e segura. Fizemos história lançando a 1ª maquininha de cartão sem aluguel, possibilitando as pessoas venderem mais e em qualquer lugar 💳.\nEm 2019 expandimos e criamos o nosso banco digital, reforçando a nossa crença no potencial transformador da tecnologia.\nHoje somos um dos maiores bancos digitais do país e uma das fintechs mais rentáveis do segmento, resultado do trabalho de um time de mais de 7 mil profissionais. Aqui no Pags, a pesquisa e a inovação fazem parte do nosso DNA. Compartilhamos experiências com profissionais talentosos e criativos em um ambiente colaborativo, onde o aprendizado é garantido. Quer fazer parte dessa história? Confira nossas vagas e #VemProPags, o banco completo."
                }
